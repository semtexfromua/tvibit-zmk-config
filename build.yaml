# GitHub Actions build matrix for the Tvibit split keyboard.
# Left = central (USB/ZMK Studio), Right = peripheral.
---
include:
  - board: nice_nano_v2
    shield: tvibit_left
    snippet: studio-rpc-usb-uart
    artifact-name: tvibit_left
  - board: nice_nano_v2
    shield: tvibit_right
    artifact-name: tvibit_right
  # Flash this to either half to wipe stored BLE pairings if the halves
  # refuse to connect. See https://zmk.dev/docs/troubleshooting/connection-issues
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: settings_reset
