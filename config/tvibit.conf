# ── Bluetooth ────────────────────────────────────────────────────────────────
CONFIG_ZMK_BLE=y
# Stronger TX power for a more reliable split link (nRF52840).
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# ── Power management ───────────────────────────────────────────────────────────
CONFIG_ZMK_SLEEP=y
# Go to deep sleep after 15 min idle (ms).
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ── Battery reporting ───────────────────────────────────────────────────────────
CONFIG_ZMK_BATTERY_REPORTING=y

# ── OLED display ────────────────────────────────────────────────────────────────
CONFIG_ZMK_DISPLAY=y

# ── ZMK Studio ──────────────────────────────────────────────────────────────────
# Disabled for now: Studio requires a zmk,physical-layout to be defined.
# Re-enable (CONFIG_ZMK_STUDIO=y + studio-rpc-usb-uart snippet on the central)
# once a physical-layout is added. https://zmk.dev/docs/features/studio
# CONFIG_ZMK_STUDIO=y
